# Cloudflare Tunnel deployment — no port published on the host.
#
# Both containers share the host network stack (network_mode: host). This is
# REQUIRED so the Marstek battery poller can discover/self-heal devices via UDP
# broadcast, which never crosses a Docker bridge network. Because cloudflared is
# also host-networked, it reaches the app on localhost.
#
# Cloudflare dashboard (https://dash.cloudflare.com):
#   Networking → Tunnels → Create a tunnel → Cloudflared connector →
#   copy the token into .env as TUNNEL_TOKEN=... → open the tunnel →
#   Published applications tab → add application with
#   Service = HTTP, URL = http://localhost:3000 (or your PORT value).
#
# Select this file via COMPOSE_FILE in .env, then run: docker compose up -d

services:
  solar-monitoring:
    # Use the released image by default. To build locally instead, run:
    #   docker compose up -d --build
    image: ghcr.io/cheminfo/solar-monitoring:latest
    build: .
    env_file: .env
    network_mode: host
    volumes:
      - ./data:/app/data
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1
    pids_limit: 256
    ulimits:
      core: 0
    logging:
      options:
        max-size: '10m'
        max-file: '3'
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    env_file: .env
    network_mode: host
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 1
    pids_limit: 64
    ulimits:
      core: 0
    logging:
      options:
        max-size: '5m'
        max-file: '2'
    restart: unless-stopped
