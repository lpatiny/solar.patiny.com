# Default deployment — the app shares the host network stack.
#
# host networking is REQUIRED: the Marstek battery poller discovers devices and
# self-heals their (DHCP) IP via UDP broadcast (255.255.255.255 / x.x.x.255),
# which never crosses a Docker bridge network. Under host networking the
# container binds PORT directly on the host, so no `ports:` mapping is needed
# (it would be ignored anyway).
services:
  solar-monitoring:
    # Use the released image by default. To build locally instead, run:
    #   docker compose up -d --build
    image: ghcr.io/cheminfo/solar-monitoring:latest
    build: .
    env_file: .env
    network_mode: host
    volumes:
      - ./data:/app/data
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1
    pids_limit: 256
    ulimits:
      core: 0
    logging:
      options:
        max-size: '10m'
        max-file: '3'
    restart: unless-stopped
